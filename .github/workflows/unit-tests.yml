name: unit-tests

on:
  push:
    branches: [main]

jobs:
  test:
    name: 🧪 Run unit tests
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 🧪 Run unit tests
        shell: bash
        working-directory: laboratories/cicd-documentation
        run: |
          python3 -m unittest discover -v
